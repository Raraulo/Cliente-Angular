<!-- ============================================================
     REGISTRO MODAL — Emil Kowalski Design Engineering
     - Modal enters from scale(0.95) + opacity:0 (never scale(0))
     - Custom easing: cubic-bezier(0.23, 1, 0.32, 1)
     - :active scale(0.97) on buttons for press feedback
     - Transitions on specific properties only
     - Stagger field appearance for delight
     ============================================================ -->

<!-- Backdrop -->
<div class="reg-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-[#0A0714]/55 backdrop-blur-sm" (click)="close.emit()"></div>

  <!-- Modal container -->
  <div class="reg-modal relative bg-white w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-[0_32px_80px_-20px_rgba(10,7,20,0.4)] max-h-[92vh]">

    <!-- ═══════ FORM SIDE ═══════ -->
    <ng-container *ngIf="!success; else successTpl">

      <div class="w-full md:w-[65%] p-8 md:p-10 overflow-y-auto max-h-[92vh] relative">

        <!-- Close -->
        <button
          class="reg-btn-close absolute top-5 right-5 z-10 w-8 h-8 rounded-full bg-[#F4F1FB] flex items-center justify-center text-[#6B6480] hover:text-[#6D28D9] hover:bg-[#E9DDFB]"
          (click)="close.emit()" aria-label="Cerrar"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <!-- Header -->
        <div class="mb-8">
          <h3 class="reg-display text-2xl font-extrabold text-[#0A0714] tracking-tight">Crear cuenta</h3>
          <p class="text-[#6B6480] text-sm mt-1.5 leading-relaxed">Completa tus datos para unirte a PawLuxury.</p>
        </div>

        <!-- Form fields -->
        <div class="space-y-5">

          <!-- Row: Cédula + Nombre -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reg-field" style="animation-delay:0ms">
            <div>
              <label class="reg-label">Cédula <span class="text-[#6D28D9]">*</span></label>
              <input [(ngModel)]="cedula" name="ced" required placeholder="0102030405"
                class="reg-input" />
            </div>
            <div>
              <label class="reg-label">Nombre <span class="text-[#6D28D9]">*</span></label>
              <input [(ngModel)]="nombre" name="nom" required placeholder="Tu nombre"
                class="reg-input" />
            </div>
          </div>

          <!-- Row: Apellido + Mail -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reg-field" style="animation-delay:40ms">
            <div>
              <label class="reg-label">Apellido</label>
              <input [(ngModel)]="apellido" name="ape" placeholder="Tu apellido"
                class="reg-input" />
            </div>
            <div>
              <label class="reg-label">Correo electrónico</label>
              <input type="email" [(ngModel)]="mail" name="mail" placeholder="correo@ejemplo.com"
                class="reg-input" />
            </div>
          </div>

          <!-- Row: Teléfono + Sexo -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reg-field" style="animation-delay:80ms">
            <div>
              <label class="reg-label">Teléfono <span class="text-[#6D28D9]">*</span></label>
              <div class="flex">
                <span class="inline-flex items-center px-3 bg-[#F4F1FB] border border-[#E9DDFB] border-r-0 rounded-l-xl text-[#6B6480] text-xs font-bold tracking-wide">
                  🇪🇨 +593
                </span>
                <input [(ngModel)]="telefono" name="tel" required placeholder="999999999"
                  class="reg-input !rounded-l-none" />
              </div>
            </div>
            <div>
              <label class="reg-label">Sexo</label>
              <select [(ngModel)]="sexo" name="sex" class="reg-input appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%236B6480%22%20stroke-width%3D%222%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[right_12px_center]">
                <option value="" disabled selected>Selecciona</option>
                <option value="M">Hombre</option>
                <option value="F">Mujer</option>
              </select>
            </div>
          </div>

          <!-- Dirección -->
          <div class="reg-field" style="animation-delay:120ms">
            <label class="reg-label">Dirección</label>
            <textarea rows="2" [(ngModel)]="direccion" name="dir" placeholder="Tu dirección"
              class="reg-input resize-none"></textarea>
          </div>

          <!-- Usuario -->
          <div class="reg-field" style="animation-delay:160ms">
            <label class="reg-label">Nombre de usuario <span class="text-[#6D28D9]">*</span></label>
            <input [(ngModel)]="usuario" name="usr" required placeholder="Elige un nombre de usuario"
              class="reg-input" />
          </div>

          <!-- Contraseñas -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reg-field" style="animation-delay:200ms">
            <div class="relative">
              <label class="reg-label">Contraseña <span class="text-[#6D28D9]">*</span></label>
              <input [type]="passVisible ? 'text' : 'password'" [(ngModel)]="pass" name="p1" required
                placeholder="••••••••" class="reg-input !pr-16" />
              <button type="button"
                class="reg-btn-toggle absolute right-3 top-[34px] text-[10px] font-extrabold tracking-widest uppercase text-[#6D28D9] hover:text-[#4C1D95]"
                (click)="passVisible = !passVisible">
                {{ passVisible ? 'Ocultar' : 'Ver' }}
              </button>
            </div>
            <div class="relative">
              <label class="reg-label">Confirmar <span class="text-[#6D28D9]">*</span></label>
              <input [type]="pass2Visible ? 'text' : 'password'" [(ngModel)]="pass2" name="p2" required
                placeholder="••••••••" class="reg-input !pr-16" />
              <button type="button"
                class="reg-btn-toggle absolute right-3 top-[34px] text-[10px] font-extrabold tracking-widest uppercase text-[#6D28D9] hover:text-[#4C1D95]"
                (click)="pass2Visible = !pass2Visible">
                {{ pass2Visible ? 'Ocultar' : 'Ver' }}
              </button>
            </div>
          </div>

          <!-- Error -->
          <div *ngIf="errorMsg" class="flex items-center gap-2 px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm font-medium">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
            {{ errorMsg }}
          </div>

          <!-- CTA -->
          <button
            class="reg-btn-submit w-full py-3.5 rounded-xl font-bold text-sm tracking-wide flex items-center justify-center gap-2 bg-[#0A0714] text-white"
            (click)="registrar()">
            Crear mi cuenta
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </button>
        </div>
      </div>

      <!-- ═══════ IMAGE SIDE ═══════ -->
      <div class="hidden md:block md:w-[35%] relative overflow-hidden bg-[#0A0714]">
        <img src="https://ae01.alicdn.com/kf/S25439a7aa499482e8c7c10aa0e00532bo.jpg?width=1000&height=1000&hash=2000"
          alt="Registro PawLuxury" class="reg-side-img absolute inset-0 w-full h-full object-cover opacity-80" />
        <div class="absolute inset-0 bg-gradient-to-t from-[#0A0714]/80 via-[#0A0714]/30 to-transparent"></div>

        <!-- Branding overlay -->
        <div class="absolute bottom-0 left-0 right-0 p-8 z-10">
          <h4 class="font-chewy text-3xl text-white mb-2 drop-shadow-lg">PawLuxury</h4>
          <p class="text-white/70 text-sm leading-relaxed max-w-xs">
            Únete a la comunidad de dueños que eligen lo mejor para sus mascotas.
          </p>
        </div>
      </div>

    </ng-container>

    <!-- ═══════ SUCCESS STATE ═══════ -->
    <ng-template #successTpl>
      <div class="reg-success flex flex-col items-center justify-center w-full p-12 md:p-16 text-center">
        <!-- Checkmark circle -->
        <div class="reg-check w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center mb-8 shadow-[0_12px_30px_-6px_rgba(16,185,129,0.5)]">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        </div>

        <h4 class="reg-display text-3xl font-extrabold text-[#0A0714] mb-3 tracking-tight">
          ¡Cuenta creada!
        </h4>
        <p class="text-[#6B6480] text-sm mb-10 max-w-sm leading-relaxed">
          Tu cuenta se ha creado exitosamente. Ya puedes iniciar sesión y explorar todo PawLuxury.
        </p>

        <button
          class="reg-btn-submit px-10 py-3.5 rounded-xl font-bold text-sm tracking-wide bg-[#0A0714] text-white flex items-center gap-2"
          (click)="cerrarTodo()">
          Comenzar
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </div>
    </ng-template>

  </div>
</div>

<!-- ===== STYLES ===== -->
<style>
  .reg-display { font-family: 'Manrope', 'Inter', sans-serif; }

  /* ── Backdrop + Modal entrance ── */
  .reg-backdrop {
    animation: reg-backdrop-in 200ms ease-out both;
  }
  .reg-modal {
    animation: reg-modal-in 280ms cubic-bezier(0.23, 1, 0.32, 1) both;
  }
  @keyframes reg-backdrop-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes reg-modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Stagger fields ── */
  .reg-field {
    opacity: 0;
    transform: translateY(8px);
    animation: reg-field-in .45s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }
  @keyframes reg-field-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Labels ── */
  .reg-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #0A0714;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  /* ── Inputs — clean, focused, responsive ── */
  .reg-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid #E9DDFB;
    background: #FAFAFF;
    font-size: 14px;
    color: #0A0714;
    outline: none;
    transition: border-color 200ms ease,
                box-shadow 200ms ease,
                background-color 200ms ease;
  }
  .reg-input::placeholder {
    color: #B8B0C8;
    font-weight: 400;
  }
  .reg-input:focus {
    border-color: #6D28D9;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.08);
  }
  .reg-input:hover:not(:focus) {
    border-color: #C4B5FD;
  }

  /* ── Buttons ── */
  .reg-btn-submit {
    transition: transform 160ms cubic-bezier(0.23, 1, 0.32, 1),
                box-shadow 200ms ease,
                background-color 200ms ease;
  }
  .reg-btn-submit:hover {
    background: linear-gradient(100deg, #6D28D9, #4C1D95) !important;
    box-shadow: 0 8px 24px -6px rgba(109, 40, 217, 0.4);
    transform: translateY(-1px);
  }
  .reg-btn-submit:active {
    transform: scale(0.97);
    box-shadow: none;
  }

  .reg-btn-close {
    transition: transform 160ms cubic-bezier(0.23, 1, 0.32, 1),
                color 200ms ease,
                background-color 200ms ease;
  }
  .reg-btn-close:active {
    transform: scale(0.9);
  }

  .reg-btn-toggle {
    transition: color 200ms ease;
  }

  /* ── Side image subtle zoom ── */
  .reg-side-img {
    animation: reg-img-zoom 18s ease-in-out infinite alternate;
  }
  @keyframes reg-img-zoom {
    0%   { transform: scale(1); }
    100% { transform: scale(1.08); }
  }

  /* ── Success checkmark ── */
  .reg-check {
    animation: reg-check-in .5s cubic-bezier(0.23, 1, 0.32, 1) both;
  }
  @keyframes reg-check-in {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }

  .reg-success {
    animation: reg-success-in .5s cubic-bezier(0.23, 1, 0.32, 1) both;
  }
  @keyframes reg-success-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Accessibility ── */
  @media (prefers-reduced-motion: reduce) {
    .reg-backdrop,
    .reg-modal,
    .reg-field,
    .reg-check,
    .reg-success,
    .reg-side-img {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
