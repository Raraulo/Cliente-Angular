<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>PawLuxury</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800;900&family=Chewy&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <app-root></app-root>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
</body>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          'chewy': ['Chewy', 'cursive'],
        },
      },
    },
  }
</script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const video = document.querySelector("video");
    if (video) {
      video.muted = true;
      video.play().catch((e) => {
        console.warn("Video no pudo reproducirse automáticamente:", e);
      });
    }
  });
</script>

</html>
